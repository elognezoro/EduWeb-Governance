<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>EduWeb Gouvernance</title>
    <style>
      html, body { margin: 0; height: 100%; background: #16a34a; color: #fff;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
      .wrap { height: 100%; display: flex; flex-direction: column; align-items: center;
        justify-content: center; gap: 1rem; text-align: center; padding: 2rem; }
      .dot { width: 12px; height: 12px; border-radius: 50%; background: #fff;
        animation: pulse 1s infinite ease-in-out; }
      @keyframes pulse { 0%, 100% { opacity: .3; transform: scale(.8); } 50% { opacity: 1; transform: scale(1); } }
      h1 { font-size: 1.25rem; font-weight: 800; margin: 0; }
      p { opacity: .85; margin: 0; font-size: .9rem; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="dot"></div>
      <h1>EduWeb Gouvernance</h1>
      <p>Chargement…</p>
    </div>
  </body>
</html>
